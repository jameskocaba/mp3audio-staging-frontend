<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETA | MP3aud.io</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="theme-color" content="#FF5500">
    <link rel="stylesheet" href="beta-style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="utility-bar">
                <div class="social-icons">
                    <a href="https://www.instagram.com/mp3aud.io" target="_blank">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    </a>
                </div>
            </div>

            <header class="logo-container">
                <img src="logo.png" alt="MP3aud.io" class="main-logo" style="max-width: 240px;">
                <h1 class="main-headline">Soundcloud Playlist & Media Converter</h1>
            </header>
            
            <div id="urlMessage" class="hidden"></div>

            <div id="userDashboard" class="dashboard-box hidden">
                <div class="dashboard-header">
                    <span style="font-size: 0.85rem; color: #64748b;">Status: <strong id="userEmailDisplay" style="color: #1e293b;">...</strong></span>
                    <button id="logoutBtn" class="text-btn hidden">Logout</button>
                </div>
                <div class="stats-row">
                    <div class="stat-pill">Free Uses: <strong id="freeUsesDisplay">0/5</strong></div>
                    <div class="stat-pill">Paid Credits: <strong id="paidCreditsDisplay">0</strong></div>
                </div>

                <div id="guestLoginSection" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
                    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 10px;">Sign in to buy credits or save your progress.</p>
                    <div class="unified-search-bar" style="margin-bottom: 5px;">
                        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                        <button id="sendLinkBtn">Send Link</button>
                    </div>
                    <div id="authMessage" style="font-size: 0.85rem; font-weight: bold;"></div>
                </div>

                <button id="buyCreditsBtn" class="premium-btn hidden">Buy 100 Credits for $2.00</button>
                <div id="billingMessage" style="font-size: 0.85rem; color: #ef4444; font-weight: bold; margin-top: 10px; display: none;"></div>
            </div>
                      
            <section id="conversionToolContainer" class="hidden" aria-label="Conversion tool">
                <div class="unified-search-bar" style="margin-top: 20px;">
                    <input type="text" id="urlInput" placeholder="Paste URL here..." autocomplete="off">
                    <button id="convertBtn">Process</button>
                    <button id="resetBtn">Reset</button>
                </div>

                <div class="options-row">
                    <div class="inline-ai-toggle">
                        <label class="switch"><input type="checkbox" id="transcribeAudio"><span class="slider round"></span></label>
                        <div class="toggle-text"><span class="feature-title" style="font-size: 0.90rem; font-weight: 700;">Smart Notes</span></div>
                    </div>
                    <button class="advanced-btn" onclick="document.getElementById('advancedModal').style.display='flex'">⚙️ Advanced</button>
                </div>
                
                <div id="status" style="margin-top: 20px;">Ready</div>
                <div id="downloadArea" class="hidden"><ul id="downloadList"></ul></div>
            </section>
        </div>
    </main>

    <div id="advancedModal" class="modal" role="dialog" aria-hidden="true">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('advancedModal').style.display='none'">&times;</span>
            <h2>Advanced Options</h2>
            <div class="input-group" style="display: flex; gap: 15px; margin-bottom: 20px; margin-top: 15px;">
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label class="micro-label">Start Time</label>
                    <input type="text" id="startTime" placeholder="00:00" style="width: 100%;">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label class="micro-label">End Time</label>
                    <input type="text" id="endTime" placeholder="Optional" style="width: 100%;">
                </div>
            </div>
            <button onclick="document.getElementById('advancedModal').style.display='none'" style="width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;">Save & Close</button>
        </div>
    </div>

    <script src="beta-script.js"></script>
</body>
</html>
