<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Shareable URLs | MP3aud.io</title>
    
    <link rel="stylesheet" href="top-5.css">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#FF5500">

</head>
<body>
    <main>
        <div class="container">
            
            <div class="utility-bar">
                <a href="index.html" class="top-chart-link">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="chart-text">Home</span>
                </a>
            </div>

            <header class="logo-container">
                <a href="index.html">
                    <img src="logo.png" alt="MP3aud.io" class="main-logo">
                </a>
                <h1 style="color: #1e293b; margin-top: 2px; font-size: 1.2rem;">Top Shareable URLs</h1>
                <p class="subtitle">
                    Copy a URL link below and paste it in the converter.
                </p>
            </header>

            <section class="chart-section" id="chart-container">
            </section>

            <footer>
                <p>&copy; 2026 MP3aud.io. All Rights Reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        // ==========================================
        //      WEEKLY UPDATES GO HERE
        // ==========================================
        
        const weeklyData = [
            
            // --- PASTE NEW WEEK HERE (COPY CODE BELOW) ---
            /* 
             {
                date: "Feb 02, 2026",
                title: "New Mix Title",
                desc: "Description goes here...",
                link: "https://soundcloud.com/link"
            },
            */
            // ---------------------------------------------

            {
                date: "Feb 16, 2026",
                title: "New Jazz",
                desc: "Cosmic Tones Research Trio",
                link: "https://soundcloud.com/thecosmictonesresearchtrio/sets/the-cosmic-tones-research-1?si=8c45cc880b9d47778beed0387113682e&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            },


            {
                date: "Feb 09, 2026",
                title: "Random Listen",
                desc: "Very Best of Solomon Burke",
                link: "https://soundcloud.com/solomonburke/sets/the-very-best-of-solomon-burke?si=99782e02d8b743ff8797462e064469d3&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            },


           {
                date: "Feb 02, 2026",
                title: "Weekly Wave",
                desc: "Shugmoon, toh, carzo, nothinglastsforever and more...",
                link: "https://soundcloud.com/discover/sets/weekly::user-841173538?si=6eb6b004813f4d2083564dd6495dad6b&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            },

            
            {
                date: "Jan 23, 2026",
                title: "Viral Rock Anthems",
                desc: "Queen, Guns and Roses, Oasis and more..",
                link: "https://soundcloud.com/user-841173538/sets/viral-rock-anthems?si=85048f778b284860a0780079da9d6e2d&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            }
        ];

        // ==========================================
        //    AUTOMATION SCRIPT (DO NOT TOUCH)
        // ==========================================

        const container = document.getElementById('chart-container');

        weeklyData.forEach(week => {
            const article = `
                <article class="week-archive-block">
                    <h2 class="date-label">Date Posted: ${week.date}</h2>
                    
                    <div class="content-row">
                        <p class="playlist-desc">
                            <strong>${week.title}:</strong> ${week.desc}
                        </p>

                        <button class="sc-share-button" onclick="copyLink(this, '${week.link}')">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            <span>Copy Playlist</span>
                        </button>
                    </div>
                </article>
            `;
            container.innerHTML += article;
        });

        function copyLink(button, url) {
            navigator.clipboard.writeText(url).then(function() {
                const span = button.querySelector('span');
                const originalText = span.innerText;
                
                span.innerText = "Link Copied!";
                button.classList.add('copied');

                setTimeout(function() {
                    span.innerText = originalText;
                    button.classList.remove('copied');
                }, 2000);
            }, function(err) {
                console.error('Could not copy text: ', err);
            });
        }
    </script>
</body>

</html>
